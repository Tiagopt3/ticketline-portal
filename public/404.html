<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Get the full requested path
      var pathSegments = window.location.pathname.split('/').filter(Boolean);
      // Remove the repo name from the path (first segment)
      var path = pathSegments.slice(1).join('/');
      // Redirect to index.html with the path as a query parameter
      window.location.replace('/ticketline-portal/?' + path);
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
